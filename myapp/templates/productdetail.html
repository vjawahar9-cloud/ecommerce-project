{% extends 'navpage.html' %}

{% block content %}

<style>
    .product-container {
        margin-top: 50px;
    }

    .product-img {
        width: 50%;
        object-fit: cover;   
        border-radius: 15px;
        transition: 0.3s;
    }

    .product-img:hover {
        transform: scale(1.05);
    }

    .product-box {
        padding: 20px;
    }

    .product-title {
        font-weight: 600;
        margin-bottom: 10px;
    }

    .price {
        color: #28a745;
        font-weight: 600;
        margin-bottom: 15px;
    }

    .desc {
        color: #555;
        margin-bottom: 20px;
    }

    .btn-cart {
        padding: 12px 25px;
        font-size: 16px;
        border-radius: 10px;
        background: linear-gradient(45deg, #28a745, #5cd65c);
        border: none;
        transition: 0.3s;
    }

    .btn-cart:hover {
        transform: scale(1.05);
        background: linear-gradient(45deg, #218838, #4cd137);
    }
</style>

<div class="container product-container">
    <div class="row align-items-center">

        <!-- IMAGE -->
        <div class="col-md-6">
            {% if product.image %}
            <img src="{{ product.image.url }}" class="product-img">
            {% endif %}
        </div>

        <!-- DETAILS -->
        <div class="col-md-6 product-box">
            <h2 class="product-title">{{ product.name }}</h2>
            <h4 class="price">₹ {{ product.price }}</h4>
            <p class="desc">{{ product.description }}</p>

            <form action="{% url 'add_to_cart' product.id %}" method="POST">
                {% csrf_token %}
                <button class="btn btn-cart">Add to Cart 🛒</button>
            </form>
        </div>

    </div>
</div>

{% endblock %}
