<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Payment</title>

    <style>
        body {
            background: #f5f7fa;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .payment-box {
            background: #fff;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        .payment-box h2 {
            margin-bottom: 5px;
            color: #2d3436;
        }

        .payment-box p {
            color: #636e72;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .amount {
            font-size: 28px;
            font-weight: bold;
            color: #27ae60;
            margin: 20px 0;
        }

        .secure-badge {
            font-size: 12px;
            color: #0984e3;
            margin-bottom: 15px;
        }

        #pay-btn {
            background: linear-gradient(135deg, #3399cc, #6c5ce7);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        #pay-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .icons {
            margin-top: 15px;
        }

        .icons img {
            width: 40px;
            margin: 5px;
        }

    </style>
</head>

<body>

<div class="payment-box">
    <h2>💳 Secure Payment</h2>
    <p>Powered by Razorpay</p>

    <div class="amount">
        ₹ {{ payment.amount|floatformat:2 }}
    </div>

    <div class="secure-badge">
        🔒 100% Safe & Encrypted Payment
    </div>

    <button id="pay-btn">Pay Now</button>

    <div class="icons">
        <img src="https://img.icons8.com/color/48/google-pay.png"/>
        <img src="https://img.icons8.com/color/48/phone-pe.png"/>
        <img src="https://img.icons8.com/color/48/visa.png"/>
        <img src="https://img.icons8.com/color/48/mastercard.png"/>
    </div>
</div>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<script>
var options = {
    "key": "{{ key_id }}",
    "amount": "{{ payment.amount }}",
    "currency": "INR",
    "name": "My Shop",
    "description": "Order Payment",
    "order_id": "{{ payment.id }}",

    "handler": function (response){
        alert("✅ Payment Successful 🎉");
        window.location.href = "/success/";
    },

    "theme": {
        "color": "#3399cc"
    }
};

var rzp = new Razorpay(options);

document.getElementById("pay-btn").onclick = function(e){
    rzp.open();
    e.preventDefault();
}
</script>

</body>
</html>
